<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Broken Ball</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: #0a0a1c;
      overflow: hidden;
      font-family: 'Arial Rounded MT Bold', 'Arial Black', Arial, sans-serif;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    #app { display: flex; align-items: center; justify-content: center; height: 100%; }
    canvas { display: block; cursor: crosshair; }

    /* ── Overlays ── */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(5,5,18,0.97);
      flex-direction: column; align-items: center; justify-content: center;
      gap: 13px; z-index: 200; padding: 20px 14px;
    }
    .overlay.show { display: flex; }

    .ov-title {
      font-size: 2.2rem; font-weight: 900;
      letter-spacing: 0.07em; text-align: center; line-height: 1.15;
    }
    .ov-sub {
      color: rgba(200,210,255,0.5); font-size: 0.78rem;
      text-align: center; max-width: 280px; line-height: 1.55;
    }
    .ov-btn {
      padding: 13px 42px; border-radius: 50px;
      background: rgba(255,255,255,0.08); border: 2px solid rgba(255,255,255,0.35);
      color: #fff; font-family: inherit; font-size: 0.9rem;
      font-weight: 800; cursor: pointer; letter-spacing: 0.07em; transition: 0.18s;
    }
    .ov-btn:hover { background: rgba(255,255,255,0.18); box-shadow: 0 0 20px rgba(255,255,255,0.15); }
    .ov-btn.accent { background: rgba(255,200,0,0.12); border-color: #ffc800; color: #ffc800; }
    .ov-btn.accent:hover { background: rgba(255,200,0,0.26); }
    .ov-btn.green  { background: rgba(0,255,120,0.08); border-color: #00e676; color: #00e676; }
    .ov-btn.dim    { background: none; border-color: rgba(255,255,255,0.16); color: rgba(255,255,255,0.38); font-size: 0.7rem; padding: 8px 20px; }
    .ov-stats {
      display: flex; gap: 20px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px; padding: 12px 22px;
    }
    .ov-stat-val { display: block; font-size: 1.15rem; font-weight: 900; }
    .ov-stat-lbl { display: block; font-size: 0.5rem; color: rgba(200,210,255,0.4); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }

    /* Level clear */
    #ovLevelClear { background: rgba(4,10,4,0.97); }
    .lc-badge {
      width: 80px; height: 80px; border-radius: 50%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-size: 2rem; background: rgba(0,255,120,0.12); border: 3px solid #00e676;
      box-shadow: 0 0 30px rgba(0,255,120,0.3);
    }

    /* Auth */
    .auth-tabs { display: flex; gap: 0; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; overflow: hidden; }
    .auth-tab { flex: 1; padding: 9px; background: transparent; border: none; color: rgba(255,255,255,0.38); font-family: inherit; font-size: 0.72rem; font-weight: 800; letter-spacing: 0.06em; cursor: pointer; transition: 0.15s; }
    .auth-tab.active { background: rgba(255,255,255,0.1); color: #fff; }
    .auth-form { display: flex; flex-direction: column; gap: 9px; width: 280px; }
    .auth-input { padding: 11px 13px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.18); border-radius: 8px; color: #fff; font-family: inherit; font-size: 0.82rem; outline: none; transition: border-color 0.15s; }
    .auth-input:focus { border-color: #ffc800; }
    .auth-input::placeholder { color: rgba(255,255,255,0.22); }
    .auth-msg { font-size: 0.68rem; text-align: center; min-height: 18px; font-weight: 700; }
    .auth-msg.err { color: #ff5555; } .auth-msg.ok { color: #00e676; }
    .auth-divider { font-size: 0.6rem; color: rgba(255,255,255,0.22); text-align: center; }

    /* Dashboard */
    #ovDashboard { padding: 16px 12px; justify-content: flex-start; overflow-y: auto; scrollbar-width: none; }
    #ovDashboard::-webkit-scrollbar { display: none; }
    .dash-card { width: 100%; max-width: 320px; background: rgba(255,200,0,0.06); border: 1px solid rgba(255,200,0,0.35); border-radius: 14px; padding: 14px 18px; display: flex; align-items: center; gap: 14px; }
    .dash-badge { min-width: 52px; height: 52px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px solid rgba(255,200,0,0.45); background: rgba(255,200,0,0.1); flex-shrink: 0; }
    .dash-badge .bp { font-size: 1rem; font-weight: 900; color: #ffc800; line-height: 1; }
    .dash-badge .bl { font-size: 0.4rem; color: rgba(255,200,0,0.5); text-transform: uppercase; }
    .dash-badge.gold   { border-color: #ffd700; } .dash-badge.gold   .bp { color: #ffd700; }
    .dash-badge.silver { border-color: #ccc; }    .dash-badge.silver .bp { color: #ccc; }
    .dash-badge.bronze { border-color: #cd7f32; } .dash-badge.bronze .bp { color: #cd7f32; }
    .dash-info { flex: 1; }
    .dash-name { font-size: 0.92rem; font-weight: 900; color: #fff; }
    .dash-mini { display: flex; gap: 12px; margin-top: 5px; }
    .dm-val { font-size: 0.82rem; font-weight: 900; display: block; }
    .dm-lbl { font-size: 0.44rem; color: rgba(255,255,255,0.38); text-transform: uppercase; letter-spacing: 0.06em; }
    .dash-sec { font-size: 0.58rem; color: rgba(255,255,255,0.3); letter-spacing: 0.1em; text-transform: uppercase; width: 100%; max-width: 320px; border-bottom: 1px solid rgba(255,255,255,0.07); padding-bottom: 4px; }
    #dashRankList { width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 5px; max-height: 34vh; overflow-y: auto; scrollbar-width: none; }
    #dashRankList::-webkit-scrollbar { display: none; }
    .rr { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 8px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); font-size: 0.7rem; }
    .rr.me { border-color: rgba(255,200,0,0.4); background: rgba(255,200,0,0.06); }
    .rr-pos { width: 22px; text-align: center; font-weight: 900; color: rgba(255,255,255,0.38); }
    .rr-pos.gold { color: #ffd700; } .rr-pos.silver { color: #ccc; } .rr-pos.bronze { color: #cd7f32; }
    .rr-name { flex: 1; color: #fff; font-weight: 700; }
    .rr-lvl  { color: #00ffff; font-size: 0.6rem; }
    .rr-sc   { color: #ffc800; font-weight: 800; }
    .dash-btns { display: flex; flex-direction: column; align-items: center; gap: 8px; width: 100%; max-width: 320px; }
    .dash-logout { background: none; border: none; color: rgba(255,255,255,0.28); font-family: inherit; font-size: 0.6rem; cursor: pointer; }
    .dash-logout:hover { color: #ff5555; }
  </style>
</head>
<body>
<div id="app"><canvas id="canvas"></canvas></div>

<!-- Start -->
<div class="overlay show" id="ovStart">
  <div class="ov-title" style="background:linear-gradient(135deg,#00ffff,#00ff80,#ffc800);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-size:2.8rem">BROKEN<br>BALL</div>
  <div class="ov-sub">Mire, dispare e destrua todos os blocos.<br>Fases infinitas — até onde você chega?</div>
  <div id="sbLogado"   style="display:none;flex-direction:column;align-items:center;gap:9px">
    <button class="ov-btn accent" onclick="goPlay()">▶ JOGAR</button>
    <button class="ov-btn dim" onclick="showAuth('login')">Trocar conta</button>
  </div>
  <div id="sbDeslogado" style="display:flex;flex-direction:column;align-items:center;gap:9px">
    <button class="ov-btn accent" onclick="showAuth('login')">🔑 ENTRAR</button>
    <button class="ov-btn green" onclick="showAuth('signup')">✚ CRIAR CONTA</button>
    <button class="ov-btn dim" onclick="goPlay()">Jogar sem conta</button>
  </div>
</div>

<!-- Auth -->
<div class="overlay" id="ovAuth">
  <div class="ov-title" style="font-size:1.5rem;color:#ffc800">BROKEN BALL</div>
  <div class="auth-tabs">
    <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">ENTRAR</button>
    <button class="auth-tab" id="tabSignup" onclick="switchTab('signup')">CADASTRAR</button>
  </div>
  <div id="formLogin" class="auth-form">
    <input class="auth-input" type="email" id="loginEmail" placeholder="E-mail">
    <input class="auth-input" type="password" id="loginPass" placeholder="Senha">
    <button class="ov-btn accent" onclick="doSignIn()" style="padding:10px">Entrar</button>
    <div class="auth-msg" id="loginMsg"></div>
  </div>
  <div id="formSignup" class="auth-form" style="display:none">
    <input class="auth-input" type="text" id="signupUser" placeholder="Nome de jogador">
    <input class="auth-input" type="email" id="signupEmail" placeholder="E-mail">
    <input class="auth-input" type="password" id="signupPass" placeholder="Senha (mín. 6 chars)">
    <button class="ov-btn green" onclick="doSignUp()" style="padding:10px">Criar conta</button>
    <div class="auth-msg" id="signupMsg"></div>
  </div>
  <div class="auth-divider">── ou ──</div>
  <button onclick="showOverlay('ovStart')" style="background:none;border:none;color:rgba(255,255,255,0.28);font-family:inherit;font-size:0.65rem;cursor:pointer">← Voltar</button>
</div>

<!-- Dashboard -->
<div class="overlay" id="ovDashboard" style="gap:12px">
  <div class="ov-title" style="font-size:1.2rem;background:linear-gradient(135deg,#00ffff,#ffc800);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">BROKEN BALL</div>
  <div class="dash-card">
    <div class="dash-badge" id="dashBadge"><span class="bp" id="dashPos">—</span><span class="bl">rank</span></div>
    <div class="dash-info">
      <div class="dash-name" id="dashName">—</div>
      <div class="dash-mini">
        <div><span class="dm-val" id="dashBestLvl" style="color:#00ffff">1</span><span class="dm-lbl">Melhor fase</span></div>
        <div><span class="dm-val" id="dashBestSc"  style="color:#ffc800">0</span><span class="dm-lbl">Recorde</span></div>
      </div>
    </div>
  </div>
  <div class="dash-sec">🏆 Ranking Global</div>
  <div id="dashRankList"><div class="ov-sub">Carregando...</div></div>
  <div class="dash-btns">
    <button class="ov-btn accent" onclick="goPlay()" style="width:100%;max-width:320px">▶ JOGAR</button>
    <button class="dash-logout" onclick="doSignOut()">↩ Sair da conta</button>
  </div>
</div>

<!-- Level Clear -->
<div class="overlay" id="ovLevelClear">
  <div class="lc-badge">⭐</div>
  <div class="ov-title" id="lcTitle" style="color:#00e676;font-size:1.7rem">FASE COMPLETA!</div>
  <div class="ov-sub" id="lcSub"></div>
  <div class="ov-stats" id="lcStats"></div>
  <button class="ov-btn green" id="lcNextBtn" onclick="nextLevel()">PRÓXIMA FASE →</button>
  <button class="ov-btn dim" onclick="goToMenu()">← Menu</button>
</div>

<!-- Game Over -->
<div class="overlay" id="ovGameOver">
  <div class="ov-title" style="color:#ff4444;font-size:2rem">💥 FIM DE JOGO</div>
  <div class="ov-sub" id="goSub"></div>
  <div class="ov-stats" id="goStats"></div>
  <button class="ov-btn" id="goRetryBtn" onclick="retryLevel()">↺ TENTAR NOVAMENTE</button>
  <button class="ov-btn dim" onclick="goToMenu()">← Menu</button>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//   BROKEN BALL  |  v3.0 — Neon, geração procedural, 20-30 linhas
// ═══════════════════════════════════════════════════════════════

// ── Canvas Setup ─────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const COLS = 7, ROWS = 12;
const BALL_SPEED = 580, BALL_R = 7;
const LAUNCH_MS = 70, STUCK_MS = 15000;
const DANGER_ROW = ROWS - 2;

let W, H, CELL, TOP_H, FLOOR_Y, LAUNCH_Y;

function setupCanvas() {
  const dpr = window.devicePixelRatio || 1;
  W    = Math.min(window.innerWidth, 420);
  CELL = Math.floor(W / COLS);
  W    = CELL * COLS;
  TOP_H   = 58;
  FLOOR_Y = TOP_H + ROWS * CELL;
  LAUNCH_Y = FLOOR_Y + 38;
  H = FLOOR_Y + 72;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);
}

// ── Cores Neon ───────────────────────────────────────────────
// Cada tier: c=cor neon brilhante, d=fundo escuro, g=glow color
const TIERS = [
  { max: 4,         c: '#00ffff', d: '#001e26', g: '#00ffff' }, // ciano
  { max: 12,        c: '#00ff80', d: '#001a0d', g: '#00ff80' }, // verde
  { max: 30,        c: '#ffff00', d: '#2a2800', g: '#ffff00' }, // amarelo
  { max: 70,        c: '#ff8800', d: '#2a1400', g: '#ff8800' }, // laranja
  { max: 160,       c: '#ff2266', d: '#2a0012', g: '#ff2266' }, // vermelho
  { max: 400,       c: '#cc44ff', d: '#1a0030', g: '#cc44ff' }, // roxo
  { max: Infinity,  c: '#ff44cc', d: '#2a0020', g: '#ff44cc' }, // rosa
];
function blockTier(hp) { return TIERS.find(t => hp <= t.max) || TIERS[6]; }

// ── Estado do Jogo ────────────────────────────────────────────
let gameState      = 'menu';
let currentLevel   = 0;
let turnCount      = 0;
let ballCount      = 1;
let collectedBalls = 0;
let score          = 0;
let totalScore     = 0;
let highScore      = parseInt(localStorage.getItem('bbHigh')  || '0');
let bestLevel      = parseInt(localStorage.getItem('bbLevel') || '1');

// Estado de geração de linhas
let currentLevelRows = [];  // array de linhas pre-geradas
let rowsDelivered    = 0;   // quantas já foram inseridas no grid

let grid  = [];
let balls = [], particles = [], floatTexts = [];

let launcherX = 0, launcherXTarget = 0;
let aimAngle  = null;
let ballsFired = 0, ballsReturned = 0;
let firstReturnX = null;
let launchTimer = 0, stuckTimer = 0;
let frameId = null, lastTs = 0;

// ── Geração Procedural de Fases ───────────────────────────────
// Retorna um array de ROWS_PER_LEVEL arrays, cada um com COLS células
// HP de cada bloco cresce conforme bolas estimadas aumentam (simula coleta de bonus)
function generateLevel(lvIdx) {
  const totalRows = Math.min(35, 20 + Math.floor(lvIdx / 2));
  const rows = [];

  // Estimativa de bolas ao longo da fase (começa em 1, cresce com bonus coletados)
  let estBalls = 1;

  for (let i = 0; i < totalRows; i++) {
    const progress = i / totalRows; // 0..1

    // Fator de dificuldade: varia de ~0.5 (início) até ~2.0 (final), escala com nível
    const hpFactor = (0.5 + progress * 1.5) * (1 + lvIdx * 0.12);

    // HP base para esta linha = bolas estimadas * fator de dificuldade
    const baseHP = Math.max(1, Math.round(estBalls * hpFactor));

    // Densidade de blocos: cresce com nível e com progresso na fase
    const density = Math.min(0.82, 0.28 + lvIdx * 0.022 + progress * 0.22);

    // Chance de bloco bonus (+bola), forte (2×HP) e ultra (4×HP)
    const bonusChance  = Math.max(0.05, 0.18 - lvIdx * 0.004);
    const strongChance = Math.min(0.30, lvIdx * 0.018 + progress * 0.12);
    const ultraChance  = Math.min(0.18, Math.max(0, (lvIdx - 4) * 0.016 + progress * 0.08 - 0.04));

    const rowCells = [];
    let bonusInRow = 0;

    for (let c = 0; c < COLS; c++) {
      if (Math.random() > density) { rowCells.push(null); continue; }

      const roll = Math.random();
      let hasBall = false, hpMult = 1;

      if (roll < ultraChance && bonusInRow < 1) {
        hpMult = 4;
      } else if (roll < ultraChance + strongChance) {
        hpMult = 2;
      } else if (roll < ultraChance + strongChance + bonusChance && bonusInRow < 2) {
        hasBall = true;
        bonusInRow++;
      }

      const hp = Math.max(1, Math.round(baseHP * hpMult));
      rowCells.push({ hp, maxHp: hp, hasBall });
    }

    rows.push(rowCells);

    // Atualiza bolas estimadas (cada bonus coletado = ~0.75 de ganho real em média)
    const bonusCount = rowCells.filter(c => c && c.hasBall).length;
    estBalls += bonusCount * 0.75;
  }

  return rows;
}

// ── Grid ─────────────────────────────────────────────────────
function initGrid() {
  grid = Array.from({ length: ROWS }, () => new Array(COLS).fill(null));
}

function loadLevel(lvIdx) {
  initGrid();
  currentLevelRows = generateLevel(lvIdx);
  rowsDelivered = 0;

  // Pre-carrega as primeiras linhas no grid
  const prefill = Math.min(5 + Math.floor(lvIdx * 0.4), 8, currentLevelRows.length);
  for (let i = 0; i < prefill; i++) {
    const row = currentLevelRows[rowsDelivered++];
    grid[i] = row.map(b => b ? { ...b } : null);
  }

  ballCount = 1; collectedBalls = 0; score = 0; turnCount = 0;
  balls = []; particles = []; floatTexts = [];
  launcherX = launcherXTarget = W / 2;
  firstReturnX = null;
}

function isGridEmpty() {
  return grid.every(row => row.every(b => b === null));
}

function checkDanger() {
  return grid[DANGER_ROW].some(b => b !== null);
}

// Avança o grid 1 linha para baixo e injeta nova linha do topo (se houver)
function advanceGrid() {
  for (let r = ROWS - 1; r > 0; r--) {
    grid[r] = grid[r - 1].map(b => b ? { ...b } : null);
  }
  if (rowsDelivered < currentLevelRows.length) {
    grid[0] = currentLevelRows[rowsDelivered++].map(b => b ? { ...b } : null);
  } else {
    grid[0] = new Array(COLS).fill(null);
  }
}

// ── Fluxo Principal ───────────────────────────────────────────
function goPlay() {
  hideOverlays();
  currentLevel = 0;
  startLevel(0);
}

function startLevel(lvIdx) {
  currentLevel = lvIdx;
  loadLevel(lvIdx);
  gameState = 'aim';
  hideOverlays();
  if (frameId) cancelAnimationFrame(frameId);
  lastTs = 0;
  frameId = requestAnimationFrame(loop);
}

function retryLevel() { startLevel(currentLevel); }

function nextLevel() { startLevel(currentLevel + 1); }

function goToMenu() {
  if (frameId) { cancelAnimationFrame(frameId); frameId = null; }
  gameState = 'menu';
  hideOverlays();
  updateStartScreen();
}

// ── Lançamento ────────────────────────────────────────────────
function fireBalls() {
  if (!aimAngle) return;
  gameState = 'firing';
  ballsFired = 0; ballsReturned = 0;
  launchTimer = 0; stuckTimer = 0;
  firstReturnX = null;
}

function launchOneBall() {
  balls.push({
    x: launcherX, y: FLOOR_Y - BALL_R - 1,
    vx: Math.cos(aimAngle) * BALL_SPEED,
    vy: Math.sin(aimAngle) * BALL_SPEED,
    active: true, trail: [],
  });
  ballsFired++;
}

function returnBall(ball) {
  if (!ball.active) return;
  ball.active = false;
  if (firstReturnX === null) {
    firstReturnX = Math.max(BALL_R + 2, Math.min(W - BALL_R - 2, ball.x));
  }
  ballsReturned++;
  if (ballsReturned >= ballCount && gameState !== 'resolving') resolveRound();
}

function resolveRound() {
  if (gameState === 'resolving' || gameState === 'over') return;
  gameState = 'resolving';
  turnCount++;
  if (firstReturnX !== null) launcherXTarget = firstReturnX;
  ballCount += collectedBalls;
  collectedBalls = 0;

  if (score + totalScore > highScore) {
    highScore = score + totalScore;
    localStorage.setItem('bbHigh', highScore);
  }

  setTimeout(() => {
    // Fase completa = todas as linhas entregues E grid vazio
    const allDelivered = rowsDelivered >= currentLevelRows.length;
    if (allDelivered && isGridEmpty()) {
      showLevelClear();
      return;
    }
    advanceGrid();
    if (checkDanger()) {
      showGameOver();
      return;
    }
    balls = [];
    launchTimer = 0;
    gameState = 'aim';
  }, 650);
}

// ── Level Clear ───────────────────────────────────────────────
function showLevelClear() {
  gameState = 'levelClear';
  totalScore += score;
  const lvNum = currentLevel + 1;
  if (lvNum > bestLevel) { bestLevel = lvNum; localStorage.setItem('bbLevel', lvNum); }
  saveScoreCloud();

  document.getElementById('lcTitle').textContent = `FASE ${lvNum} — COMPLETA! ⭐`;
  document.getElementById('lcSub').textContent   = `Próxima: FASE ${lvNum + 1} — mais linhas, mais desafio!`;
  document.getElementById('lcStats').innerHTML   = `
    <div class="ov-stat"><span class="ov-stat-val" style="color:#ffc800">${score}</span><span class="ov-stat-lbl">Score</span></div>
    <div class="ov-stat"><span class="ov-stat-val" style="color:#00e676">${turnCount}</span><span class="ov-stat-lbl">Turnos</span></div>
    <div class="ov-stat"><span class="ov-stat-val" style="color:#00ffff">${ballCount}</span><span class="ov-stat-lbl">Bolas</span></div>`;
  const btn = document.getElementById('lcNextBtn');
  btn.textContent = `FASE ${lvNum + 1} →`;
  btn.onclick = nextLevel;
  hideOverlays();
  document.getElementById('ovLevelClear').classList.add('show');
  spawnCelebration();
}

function spawnCelebration() {
  const colors = ['#00ffff','#00ff80','#ffc800','#ff44cc','#cc44ff'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const x = Math.random() * W;
      const c = colors[Math.floor(Math.random() * colors.length)];
      particles.push({ x, y: 0, vx: (Math.random()-0.5)*200, vy: 80+Math.random()*220, life: 2.2, maxLife: 2.2, color: c, size: 4+Math.random()*6, shape: Math.random()<0.5?'sq':'ci' });
    }, i * 28);
  }
}

// ── Game Over ─────────────────────────────────────────────────
function showGameOver() {
  gameState = 'over';
  saveScoreCloud();

    <div class="ov-stat"><span class="ov-stat-val" style="color:#00e676">${turnCount}</span><span class="ov-stat-lbl">Turnos</span></div>`;
  hideOverlays();
  document.getElementById('ovGameOver').classList.add('show');
}

// ── Física ────────────────────────────────────────────────────
function updateBalls(dt) {
  for (const b of balls) {
    if (!b.active) continue;
    b.trail.push({ x: b.x, y: b.y });
    if (b.trail.length > 8) b.trail.shift();
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    if (b.x - BALL_R < 0)     { b.x = BALL_R;     b.vx =  Math.abs(b.vx); }
    if (b.x + BALL_R > W)     { b.x = W - BALL_R; b.vx = -Math.abs(b.vx); }
    if (b.y - BALL_R < TOP_H) { b.y = TOP_H + BALL_R; b.vy = Math.abs(b.vy); }
    if (b.y + BALL_R >= FLOOR_Y) { spawnReturn(b.x); returnBall(b); continue; }
    checkBlocks(b);
  }
}

function circleAABB(cx,cy,cr,rx,ry,rw,rh) {
  const nx=Math.max(rx,Math.min(cx,rx+rw)), ny=Math.max(ry,Math.min(cy,ry+rh));
  return (cx-nx)**2+(cy-ny)**2<cr*cr;
}

function checkBlocks(ball) {
  const r1=Math.max(0,Math.floor((ball.y-BALL_R-TOP_H)/CELL));
  const r2=Math.min(ROWS-1,Math.floor((ball.y+BALL_R-TOP_H)/CELL));
  const c1=Math.max(0,Math.floor((ball.x-BALL_R)/CELL));
  const c2=Math.min(COLS-1,Math.floor((ball.x+BALL_R)/CELL));
  let reflected = false;

  for (let r=r1;r<=r2;r++) for (let c=c1;c<=c2;c++) {
    const blk=grid[r][c]; if (!blk) continue;
    const bx=c*CELL, by=TOP_H+r*CELL;
    if (!circleAABB(ball.x,ball.y,BALL_R,bx,by,CELL,CELL)) continue;

    if (!reflected) {
      const oL=(ball.x+BALL_R)-bx, oR=(bx+CELL)-(ball.x-BALL_R);
      const oT=(ball.y+BALL_R)-by, oB=(by+CELL)-(ball.y-BALL_R);
      const mo=Math.min(oL,oR,oT,oB);
      if      (mo===oT){ball.vy=-Math.abs(ball.vy);ball.y=by-BALL_R;}
      else if (mo===oB){ball.vy= Math.abs(ball.vy);ball.y=by+CELL+BALL_R;}
      else if (mo===oL){ball.vx=-Math.abs(ball.vx);ball.x=bx-BALL_R;}
      else             {ball.vx= Math.abs(ball.vx);ball.x=bx+CELL+BALL_R;}
      reflected=true;
    }

    const tier=blockTier(blk.hp);
    spawnHit(bx+CELL/2, by+CELL/2, tier.c);
    blk.hp--; score++;

    if (blk.hp<=0) {
      grid[r][c]=null;
      spawnBreak(bx+CELL/2, by+CELL/2, tier.c);
      const bonus = Math.ceil(blk.maxHp / 2);
      addFloat('+'+bonus, bx+CELL/2, by+CELL/2, tier.c);
      score += bonus;
      if (blk.hasBall) {
        collectedBalls++;
        spawnCollect(bx+CELL/2, by+CELL/2);
        addFloat('+1 🔵', bx+CELL/2, by+CELL/2-18, '#00ffff');
      }
    }
  }
}

// ── Partículas ────────────────────────────────────────────────
function spawnHit(x,y,c){
  for(let i=0;i<3;i++){const a=Math.random()*Math.PI*2,s=90+Math.random()*130;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:.6,maxLife:.6,color:c,size:2+Math.random()*2,shape:'sq'});}
}
function spawnBreak(x,y,c){
  for(let i=0;i<14;i++){const a=Math.random()*Math.PI*2,s=110+Math.random()*220;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,maxLife:1,color:c,size:3+Math.random()*5,shape:Math.random()<.5?'sq':'ci'});}
}
function spawnCollect(x,y){
  for(let i=0;i<8;i++){const a=-Math.PI/2+(Math.random()-.5)*Math.PI;particles.push({x,y,vx:Math.cos(a)*140,vy:Math.sin(a)*160,life:.9,maxLife:.9,color:'#00ffff',size:3,shape:'ci'});}
}
function spawnReturn(x){
  for(let i=0;i<3;i++){const a=-Math.PI+Math.random()*Math.PI;particles.push({x,y:FLOOR_Y,vx:Math.cos(a)*60,vy:Math.sin(a)*70-30,life:.5,maxLife:.5,color:'rgba(255,255,255,0.6)',size:2,shape:'ci'});}
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=350*dt;p.life-=dt*1.6;if(p.life<=0)particles.splice(i,1);}
}
function addFloat(t,x,y,c){floatTexts.push({text:t,x,y,vy:-55,life:1,maxLife:1,color:c});}
function updateFloats(dt){
  for(let i=floatTexts.length-1;i>=0;i--){const f=floatTexts[i];f.y+=f.vy*dt;f.life-=dt*1.2;if(f.life<=0)floatTexts.splice(i,1);}
}

// ── Mira ──────────────────────────────────────────────────────
function calcAngle(mx,my){
  const dy=my-(FLOOR_Y-BALL_R);
  if(dy>=-8)return null;
  let a=Math.atan2(dy,mx-launcherX);
  const MIN=0.13;
  if(a>-MIN)a=-MIN;
  if(a<-(Math.PI-MIN))a=-(Math.PI-MIN);
  return a;
}

// ── Desenho ───────────────────────────────────────────────────
function drawBG() {
  // Gradiente de fundo muda sutilmente com o nível
  const hue = (currentLevel * 22) % 360;
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#06060f');
  g.addColorStop(1,`hsl(${hue},30%,4%)`);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  // Grade de pontos decorativa
  ctx.fillStyle='rgba(255,255,255,0.018)';
  const GSIZE=24;
  for(let gx=GSIZE/2;gx<W;gx+=GSIZE) for(let gy=TOP_H+GSIZE/2;gy<FLOOR_Y;gy+=GSIZE){
    ctx.beginPath();ctx.arc(gx,gy,0.8,0,Math.PI*2);ctx.fill();
  }
}

function drawGrid2() {
  ctx.strokeStyle='rgba(255,255,255,0.03)'; ctx.lineWidth=0.5;
  for(let r=0;r<=ROWS;r++){ctx.beginPath();ctx.moveTo(0,TOP_H+r*CELL);ctx.lineTo(W,TOP_H+r*CELL);ctx.stroke();}
  for(let c=0;c<=COLS;c++){ctx.beginPath();ctx.moveTo(c*CELL,TOP_H);ctx.lineTo(c*CELL,FLOOR_Y);ctx.stroke();}

  // Linha de perigo (neon vermelho sutil)
  ctx.strokeStyle='rgba(255,50,80,0.22)'; ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(0,TOP_H+DANGER_ROW*CELL);ctx.lineTo(W,TOP_H+DANGER_ROW*CELL);ctx.stroke();

  // Linha do chão
  ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,FLOOR_Y);ctx.lineTo(W,FLOOR_Y);ctx.stroke();
}

function rr(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

function drawBlocks2() {
  const PAD=2, RAD=6;
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const blk=grid[r][c]; if(!blk) continue;
    const x=c*CELL+PAD, y=TOP_H+r*CELL+PAD, sz=CELL-PAD*2;
    const tier=blockTier(blk.hp);
    const dmg=1-blk.hp/blk.maxHp;

    ctx.save();

    // Glow neon externo
    ctx.shadowColor=tier.g;
    ctx.shadowBlur=12;
    rr(ctx,x,y,sz,sz,RAD);
    ctx.fillStyle=tier.d;
    ctx.fill();

    // Borda neon brilhante
    ctx.shadowBlur=16;
    rr(ctx,x,y,sz,sz,RAD);
    ctx.strokeStyle=tier.c;
    ctx.lineWidth=2;
    ctx.stroke();

    ctx.restore();

    // Escurecimento por dano
    if(dmg>0.25){
      rr(ctx,x,y,sz,sz,RAD);
      ctx.fillStyle=`rgba(0,0,0,${(dmg-0.25)*0.85})`;
      ctx.fill();
    }

    // Brilho superior (reflexo)
    rr(ctx,x+2,y+2,sz-4,sz*0.28,RAD-2);
    ctx.fillStyle=`rgba(255,255,255,${Math.max(0,0.14-dmg*0.1)})`;
    ctx.fill();

    // Indicador de bonus (bolinha ciano no centro-baixo)
    if(blk.hasBall){
      ctx.shadowColor='#00ffff';
      ctx.shadowBlur=8;
      ctx.beginPath();ctx.arc(x+sz/2,y+sz*0.78,sz*0.11,0,Math.PI*2);
      ctx.fillStyle='rgba(0,255,255,0.9)';ctx.fill();
      ctx.shadowBlur=0;
    }

    // Número HP (texto neon)
    const yOff=blk.hasBall?-sz*0.06:0;
    const fs=blk.hp>=1000?sz*.24:blk.hp>=100?sz*.3:sz*.38;
    ctx.shadowColor=tier.g;
    ctx.shadowBlur=8;
    ctx.fillStyle=tier.c;
    ctx.font=`900 ${fs}px 'Arial Rounded MT Bold',Arial,sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(blk.hp,x+sz/2,y+sz/2+yOff+1);
    ctx.shadowBlur=0;
  }
}

function drawBalls2(){
  for(const b of balls){
    if(!b.active)continue;
    for(let i=0;i<b.trail.length;i++){
      const t=b.trail[i],alpha=(i+1)/(b.trail.length+1)*0.28,sz=BALL_R*(i+1)/(b.trail.length+1)*0.6;
      ctx.beginPath();ctx.arc(t.x,t.y,sz,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,240,80,${alpha})`;ctx.fill();
    }
    // Glow da bola
    const gw=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,BALL_R*2.8);
    gw.addColorStop(0,'rgba(255,255,200,0.4)');gw.addColorStop(1,'rgba(255,255,200,0)');
    ctx.beginPath();ctx.arc(b.x,b.y,BALL_R*2.8,0,Math.PI*2);ctx.fillStyle=gw;ctx.fill();
    // Bola
    ctx.shadowColor='rgba(255,255,200,0.9)';ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(b.x,b.y,BALL_R,0,Math.PI*2);
    ctx.fillStyle='#ffffff';ctx.fill();
    ctx.shadowBlur=0;
  }
}

function drawAimLine2(){
  if(gameState!=='aim'||!aimAngle)return;
  const STEP=5;
  let x=launcherX,y=FLOOR_Y-BALL_R-1;
  let vx=Math.cos(aimAngle),vy=Math.sin(aimAngle);
  let dotIdx=0;
  for(let i=0;i<3000;i++){
    x+=vx*STEP;y+=vy*STEP;
    if(x<=BALL_R){x=BALL_R;vx=Math.abs(vx);}
    if(x>=W-BALL_R){x=W-BALL_R;vx=-Math.abs(vx);}
    if(y<=TOP_H+BALL_R){y=TOP_H+BALL_R;vy=Math.abs(vy);}
    if(y>=FLOOR_Y)break;
    const bc=Math.floor(x/CELL),br=Math.floor((y-TOP_H)/CELL);
    if(br>=0&&br<ROWS&&bc>=0&&bc<COLS&&grid[br][bc]){
      ctx.shadowColor='#ffc800';ctx.shadowBlur=10;
      ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);
      ctx.fillStyle='#ffc800';ctx.fill();
      ctx.shadowBlur=0;break;
    }
    if(i%5===0){
      const alpha=0.55-dotIdx*.004;if(alpha<=0)break;
      ctx.beginPath();ctx.arc(x,y,2.5,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${alpha})`;ctx.fill();dotIdx++;
    }
  }
}

function drawLauncher2(){
  const x=launcherX;
  // Plataforma
  ctx.shadowColor='rgba(255,255,200,0.5)';ctx.shadowBlur=6;
  ctx.beginPath();ctx.arc(x,FLOOR_Y+4,4,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.18)';ctx.fill();
  ctx.shadowBlur=0;

  if(aimAngle&&gameState==='aim'){
    const len=22,ax=x+Math.cos(aimAngle)*len,ay=(FLOOR_Y-BALL_R-1)+Math.sin(aimAngle)*len;
    ctx.strokeStyle='rgba(255,200,0,0.7)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(x,FLOOR_Y-BALL_R-1);ctx.lineTo(ax,ay);ctx.stroke();
    const hl=8,ha=0.45;
    ctx.beginPath();ctx.moveTo(ax,ay);
    ctx.lineTo(ax+Math.cos(aimAngle+Math.PI-ha)*hl,ay+Math.sin(aimAngle+Math.PI-ha)*hl);
    ctx.lineTo(ax+Math.cos(aimAngle+Math.PI+ha)*hl,ay+Math.sin(aimAngle+Math.PI+ha)*hl);
    ctx.closePath();ctx.fillStyle='rgba(255,200,0,0.7)';ctx.fill();
  }

  // Bola do lançador
  ctx.shadowColor='rgba(255,255,200,0.9)';ctx.shadowBlur=12;
  ctx.beginPath();ctx.arc(x,FLOOR_Y-BALL_R-1,BALL_R,0,Math.PI*2);
  ctx.fillStyle='#ffffff';ctx.fill();
  ctx.strokeStyle='rgba(255,200,0,0.8)';ctx.lineWidth=2;ctx.stroke();
  ctx.shadowBlur=0;

  if(ballCount>1||gameState==='resolving'){
    ctx.fillStyle='#ffc800';
    ctx.font=`800 11px 'Arial Rounded MT Bold',Arial,sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText('×'+ballCount, x, FLOOR_Y-BALL_R+12);
  }
}

function drawParticles2(){
  for(const p of particles){
    const a=Math.max(0,p.life/p.maxLife);ctx.globalAlpha=a;
    ctx.shadowColor=p.color;ctx.shadowBlur=4;
    ctx.fillStyle=p.color;
    if(p.shape==='ci'){ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();}
    else ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
    ctx.globalAlpha=1;ctx.shadowBlur=0;
  }
}

function drawFloats2(){
  for(const f of floatTexts){
    ctx.globalAlpha=Math.max(0,f.life/f.maxLife);
    ctx.shadowColor=f.color;ctx.shadowBlur=6;
    ctx.fillStyle=f.color;ctx.font=`800 12px 'Arial Rounded MT Bold',Arial,sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(f.text,f.x,f.y);
    ctx.globalAlpha=1;ctx.shadowBlur=0;
  }
}

function drawHUD2(){
  ctx.fillStyle='rgba(6,6,18,0.95)';ctx.fillRect(0,0,W,TOP_H);
  ctx.strokeStyle='rgba(255,255,255,0.07)';ctx.lineWidth=0.5;
  ctx.beginPath();ctx.moveTo(0,TOP_H);ctx.lineTo(W,TOP_H);ctx.stroke();

  // Barra de progresso da fase (linhas restantes)
  const progress = currentLevelRows.length > 0
    ? rowsDelivered / currentLevelRows.length : 1;
  ctx.fillStyle='rgba(255,255,255,0.05)';
  ctx.fillRect(0,TOP_H-3,W,3);
  const hue=(currentLevel*22)%360;
  ctx.fillStyle=`hsl(${hue},100%,60%)`;
  ctx.shadowColor=`hsl(${hue},100%,60%)`;
  ctx.shadowBlur=6;
  ctx.fillRect(0,TOP_H-3,W*progress,3);
  ctx.shadowBlur=0;

  const items2=[
    {l:'FASE',   v:currentLevel+1,              c:'#00ffff'},
    {l:'TURNO',  v:turnCount,                   c:'rgba(255,255,255,0.55)'},
    {l:'SCORE',  v:score,                       c:'#ffc800'},
    {l:'BOLAS',  v:ballCount,                   c:'#00ff80'},
  ];
  const cw=W/items2.length;
  ctx.textAlign='center';
  items2.forEach((it,i)=>{
    const cx=cw*i+cw/2;
    ctx.fillStyle='rgba(255,255,255,0.28)';
    ctx.font=`700 8px 'Arial Rounded MT Bold',Arial,sans-serif`;
    ctx.textBaseline='top';ctx.fillText(it.l,cx,6);
    ctx.fillStyle=it.c;
    ctx.shadowColor=it.c;ctx.shadowBlur=6;
    ctx.font=`900 17px 'Arial Rounded MT Bold',Arial,sans-serif`;
    ctx.textBaseline='alphabetic';ctx.fillText(it.v,cx,TOP_H-7);
    ctx.shadowBlur=0;
  });
}

function drawStateMsg2(){
  if(gameState==='resolving'){
    ctx.fillStyle='rgba(0,255,255,0.65)';
    ctx.shadowColor='#00ffff';ctx.shadowBlur=8;
    ctx.font=`800 12px 'Arial Rounded MT Bold',Arial,sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('CALCULANDO...', W/2, FLOOR_Y+18);
    ctx.shadowBlur=0;
  }
}

// ── Loop Principal ────────────────────────────────────────────
function loop(ts){
  frameId=requestAnimationFrame(loop);
  const dt=Math.min((ts-(lastTs||ts))/1000,.05);lastTs=ts;

  launcherX+=(launcherXTarget-launcherX)*Math.min(1,dt*9);

  if(gameState==='firing'){
    launchTimer+=dt*1000;
    if(launchTimer>=LAUNCH_MS){launchTimer-=LAUNCH_MS;launchOneBall();if(ballsFired>=ballCount)gameState='simulating';}
  }
  if(gameState==='firing'||gameState==='simulating'){
    stuckTimer+=dt*1000;
    if(stuckTimer>=STUCK_MS){
      stuckTimer=0;
      for(const b of balls)if(b.active){b.active=false;if(firstReturnX===null)firstReturnX=Math.max(BALL_R+2,Math.min(W-BALL_R-2,b.x));ballsReturned++;}
      resolveRound();
    }
  }
  if(gameState!=='menu'){updateBalls(dt);updateParticles(dt);updateFloats(dt);}

  drawBG();drawGrid2();drawBlocks2();drawAimLine2();drawBalls2();drawParticles2();drawFloats2();drawLauncher2();drawHUD2();drawStateMsg2();
}

function getPos(e){
  const r=canvas.getBoundingClientRect(),s=e.touches?e.touches[0]:e;
  return{x:(s.clientX-r.left)*(W/r.width),y:(s.clientY-r.top)*(H/r.height)};
}
canvas.addEventListener('mousemove',e=>{if(gameState!=='aim')return;const p=getPos(e);aimAngle=calcAngle(p.x,p.y);});
canvas.addEventListener('touchmove',e=>{e.preventDefault();if(gameState!=='aim')return;const p=getPos(e);aimAngle=calcAngle(p.x,p.y);},{passive:false});
canvas.addEventListener('click',e=>{if(gameState!=='aim')return;const p=getPos(e);const a=calcAngle(p.x,p.y);if(!a)return;aimAngle=a;fireBalls();});
canvas.addEventListener('touchend',e=>{e.preventDefault();if(gameState!=='aim'||!aimAngle)return;fireBalls();},{passive:false});

  if(error)return setMsg('loginMsg',error.message,true);
  supaUser=data.user;await loadProfile();
  setMsg('loginMsg','✅ Bem-vindo, '+(supaProfile?.username||'')+'!',false);
  setTimeout(()=>showDashboard(),1200);
}

async function doSignOut(){
  await supa.auth.signOut();supaUser=null;supaProfile=null;
  hideOverlays();document.getElementById('ovStart').classList.add('show');
  document.getElementById('sbLogado').style.display='none';
  document.getElementById('sbDeslogado').style.display='flex';
}

async function loadProfile(){
  if(!supaUser)return;
  const{data}=await supa.from('profiles').select('username').eq('id',supaUser.id).single();
  supaProfile=data||null;
}

async function saveScoreCloud(){
  if(!supaUser)return;
  const{data:ex}=await supa.from('bb_scores').select('best_score,best_level').eq('user_id',supaUser.id).single();
  await supa.from('bb_scores').upsert({
    user_id:supaUser.id,
    best_score:ex?Math.max(ex.best_score,totalScore+score):totalScore+score,
    best_level:ex?Math.max(ex.best_level,currentLevel+1):currentLevel+1,
    updated_at:new Date().toISOString()
  },{onConflict:'user_id'});
}

async function showDashboard(){
  hideOverlays();document.getElementById('ovDashboard').classList.add('show');
  document.getElementById('dashName').textContent=supaProfile?.username||'—';
  document.getElementById('dashRankList').innerHTML='<div class="ov-sub">Carregando...</div>';

  const{data,error}=await supa.from('bb_scores')
    .select('user_id,best_score,best_level,profiles(username)')
    .order('best_score',{ascending:false});

  if(error||!data||!data.length){
    document.getElementById('dashRankList').innerHTML='<div class="ov-sub" style="opacity:.4">Nenhum score ainda. Seja o primeiro!</div>';
    document.getElementById('dashPos').textContent='—';
    document.getElementById('dashBestLvl').textContent=bestLevel;
    document.getElementById('dashBestSc').textContent=highScore;
    return;
  }
  const medals=['gold','silver','bronze'];
  const myIdx=data.findIndex(r=>r.user_id===supaUser?.id);
  const myPos=myIdx>=0?myIdx+1:null;
  const myRow=myIdx>=0?data[myIdx]:null;
  const badge=document.getElementById('dashBadge');
  badge.className='dash-badge '+(myPos?(medals[myPos-1]||''):'');
  document.getElementById('dashPos').textContent=myPos?myPos+'°':'—';
  document.getElementById('dashBestLvl').textContent=myRow?.best_level??bestLevel;
  document.getElementById('dashBestSc').textContent=myRow?.best_score??highScore;

  document.getElementById('dashRankList').innerHTML=data.slice(0,10).map((row,i)=>{
    const name=row.profiles?.username||'Desconhecido';
    const isMe=row.user_id===supaUser?.id;
    const pc=medals[i]||'';
    return `<div class="rr ${isMe?'me':''}"><span class="rr-pos ${pc}">${i+1}°</span><span class="rr-name">${name}${isMe?' 👈':''}</span><span class="rr-lvl">F${row.best_level}</span><span class="rr-sc">${row.best_score}pts</span></div>`;
  }).join('');

  if(myPos&&myPos>10){
    document.getElementById('dashRankList').innerHTML+=`<div style="text-align:center;font-size:.6rem;color:rgba(255,255,255,.2);padding:4px 0">• • •</div><div class="rr me"><span class="rr-pos">${myPos}°</span><span class="rr-name">${supaProfile.username} 👈</span><span class="rr-lvl">F${myRow.best_level}</span><span class="rr-sc">${myRow.best_score}pts</span></div>`;
  }
}

// ── Resize ────────────────────────────────────────────────────
window.addEventListener('resize',()=>{setupCanvas();launcherX=launcherXTarget=W/2;});

// ── Boot ──────────────────────────────────────────────────────
setupCanvas();
frameId=requestAnimationFrame(loop);

(async()=>{
  const{data:{session}}=await supa.auth.getSession();
  if(session){supaUser=session.user;await loadProfile();}
  updateStartScreen();
})();
</script>
